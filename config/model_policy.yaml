# =============================================================================
# VendorVigil — Model Policy Configuration
# ARCHITECTURE RULE:
#   - Band           = coordination layer
#   - Pydantic AI    = agent framework (all 7 agents)
#   - AI/ML API      = provider/gateway (frontier models)
#   - Featherless    = provider/gateway (open-source models)
#
# FRAMEWORK: Pydantic AI for all agents (unified, clean adapter)
# 7 agents, 7 different models, 2 providers
# =============================================================================

meta:
  project_owner: "OlengSquad"
  hackathon: "Band of Agents Hackathon 2026"
  principle: "Partner-credit safe first, direct-upgrade optional"
  band_role: "coordination layer"
  framework_all: "Pydantic AI"
  cross_provider: true

providers:
  aimlapi:
    base_url: "https://api.aimlapi.com/v1"
    env_key: "AIML_API_KEY"
    role: "frontier reasoning, extraction, report, model orchestration"

  featherless:
    base_url: "https://api.featherless.ai/v1"
    env_key: "FEATHERLESS_API_KEY"
    role: "open-source reasoning, adversarial review, auditability"

model_rules:
  - "Every agent uses a DIFFERENT model — never share the same model."
  - "Do not call AI/ML API or Featherless a framework. They are providers/gateways."
  - "Use deterministic Python rules for final numeric scoring."
  - "Use LLMs for extraction, reasoning, critique, explanation, and report writing."
  - "Use fallback if model availability check fails."
  - "Keep Band @mention and audit trail visible in the demo."

# =============================================================================
# Agent → Model Mapping (Actual Implementation)
# =============================================================================

vendorvigil:
  vendor_coordinator:
    framework: "Pydantic AI"
    adapter: "VendorVigilPydanticAdapter"
    provider: "aimlapi"
    model: "google/gemini-3-flash-preview"
    purpose: "Fast routing and vendor type classification"

  security_reviewer:
    framework: "Pydantic AI"
    adapter: "VendorVigilPydanticAdapter"
    provider: "aimlapi"
    model: "openai/gpt-5-2"
    purpose: "Security control review (SOC 2, ISO 27001, encryption)"

  privacy_reviewer:
    framework: "Pydantic AI"
    adapter: "VendorVigilPydanticAdapter"
    provider: "aimlapi"
    model: "openai/gpt-5-nano-2025-08-07"
    purpose: "Privacy and compliance reasoning (DPA, GDPR, data location)"

  financial_reviewer:
    framework: "Pydantic AI"
    adapter: "VendorVigilPydanticAdapter"
    provider: "featherless"
    model: "Qwen/Qwen3.6-27B"
    purpose: "Open-source financial risk analysis"

  risk_scorer:
    framework: "Pydantic AI"
    adapter: "VendorVigilPydanticAdapter"
    provider: "featherless"
    model: "Qwen/Qwen3.5-27B"
    purpose: "Risk scoring, fail-closed decision, second opinion"

  audit_logger:
    framework: "Pydantic AI"
    adapter: "VendorVigilPydanticAdapter"
    provider: "aimlapi"
    model: "openai/gpt-5-2"
    purpose: "Structured audit trail and decision log"

  report_compiler:
    framework: "Pydantic AI"
    adapter: "VendorVigilPydanticAdapter"
    provider: "aimlapi"
    model: "openai/gpt-5-1"
    purpose: "Final report and demo narrative"

# =============================================================================
# Summary: Provider Distribution
# =============================================================================
# AI/ML API: 5 agents (coordinator, security, privacy, audit, report)
# Featherless: 2 agents (financial, risk) — safe within 4-unit concurrency limit
#
# Model Diversity: 7 unique models across 7 agents
#   1. google/gemini-3-flash-preview       (coordinator — fast routing)
#   2. openai/gpt-5-2                      (security + audit — compliance reasoning)
#   3. openai/gpt-5-nano-2025-08-07        (privacy — fast reasoning)
#   4. Qwen/Qwen3.6-27B                    (financial — open source)
#   5. Qwen/Qwen3.5-27B                    (risk — open source reasoning)
#   6. openai/gpt-5-1                      (report — frontier writing)
